services:
  - type: web
    name: next-japan-web
    env: node
    rootDir: frontend
    plan: starter
    buildCommand: npm ci --include=dev && npx ng build
    startCommand: npm run serve:ssr:next-japan-web
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.18.0
