@if (signup()) {
  <button
    nextButton
    class="app-button-outlined transparent"
    [touchAware]="true"
    (click)="login()"
  >
    <span class="button-text"> Get Started </span>
  </button>
} @else {
  <button nextButton variant="priority" [touchAware]="true" (click)="login()">
    <span class="button-text">Try Demo</span>
  </button>
}
