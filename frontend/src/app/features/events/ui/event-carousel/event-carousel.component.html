@if (ssrMode() || hideCarousel() || sortedEvents().length < 2) {
  <div class="carousel-ssr">
    @for (event of sortedEvents(); track event.eventId) {
      <app-event-card [event]="event"></app-event-card>
    }
  </div>
} @else {
  <swiper-container
    class="event-swiper"
    role="region"
    aria-label="Featured events carousel"
    [rewind]="true"
    [slidesPerView]="1"
    [spaceBetween]="16"
    [autoplay]="autoplayConfig"
    [breakpoints]="breakpoints"
    [pagination]="showIndicators() ? paginationConfig : false"
    [navigation]="true"
  >
    @for (event of sortedEvents(); track event.eventId) {
      <swiper-slide>
        <app-event-card [event]="event" />
      </swiper-slide>
    }
  </swiper-container>
}
