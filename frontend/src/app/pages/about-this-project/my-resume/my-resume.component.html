<app-dialog size="lg" (close)="close.emit(true)">
  <main class="dialog">
    <div class="resume-container">
      <markdown [data]="resumeContent()"></markdown>
    </div>
  </main>
  <footer class="dialog">
    <a href="/assets/resume.md" download> Download Resume (Markdown) </a>
    <div class="button">
      <button
        nextButton
        class="app-button-filled dialog"
        (click)="closeResume()"
      >
        Close
      </button>
    </div>
  </footer>
</app-dialog>
